services:
  backend:
    build: .
    ports:
      - "8000:8000"       # localhost:8000 → container:8000
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: otm_user
      POSTGRES_PASSWORD: otm_pass
      POSTGRES_DB: otm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otm_user -d otm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: